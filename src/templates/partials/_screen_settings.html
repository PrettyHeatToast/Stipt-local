<!-- ── Settings dialog ───────────────────────────────────────────── -->
<dialog id="settings-dialog" aria-labelledby="settings-dialog-title">
  <div class="settings-dialog-header">
    <h1 class="page-title" id="settings-dialog-title" style="margin:0">Instellingen</h1>
    <button class="btn btn-icon" id="settings-close-btn" type="button" aria-label="Sluiten">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="settings-dialog-body">
    <div id="settings-error" class="banner banner-error" style="display:none;margin-top:var(--space-4)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="settings-error-msg"></span>
      <button class="banner-close" onclick="closeBanner('settings-error')" aria-label="Sluit melding">✕</button>
    </div>

    <!-- Canvas -->
    <div class="settings-section">
      <h2 class="settings-section-title">Canvas</h2>
      <div class="field">
        <label for="settings-canvas-url">Canvas URL</label>
        <input type="url" id="settings-canvas-url" placeholder="https://jouwschool.instructure.com" autocomplete="off" />
      </div>
      <div class="field">
        <label for="settings-api-token">API-token <span class="optional-label">(leeglaten = ongewijzigd)</span></label>
        <input type="password" id="settings-api-token" placeholder="Ongewijzigd laten" autocomplete="off" />
      </div>
    </div>

    <!-- Rooster -->
    <div class="settings-section">
      <h2 class="settings-section-title">Rooster</h2>
      <div class="field">
        <label for="settings-ical-url">iCal-URL <span class="optional-label">(optioneel)</span></label>
        <input type="url" id="settings-ical-url" placeholder="https://cloud.timeedit.net/…/ri.ics" autocomplete="off" />
      </div>
    </div>

    <!-- Sessie -->
    <div class="settings-section">
      <h2 class="settings-section-title">Sessie</h2>
      <div class="field">
        <label for="settings-duration">Sessieduur</label>
        <div class="input-unit-row">
          <input type="number" id="settings-duration" min="1" max="120" />
          <span class="input-unit">minuten</span>
        </div>
      </div>
      <div class="field">
        <label for="settings-pin-duration">PIN-rotatietijd</label>
        <div class="input-unit-row">
          <input type="number" id="settings-pin-duration" min="10" max="300" />
          <span class="input-unit">seconden</span>
        </div>
      </div>
      <div class="field">
        <label>Check-in score</label>
        <div class="score-selector" role="group" aria-label="Standaard check-in score">
          <button class="score-option" data-score="0" type="button">Afwezig</button>
          <button class="score-option" data-score="1" type="button">Aanwezig</button>
          <button class="score-option" data-score="2" type="button">Actief aanwezig</button>
        </div>
      </div>
    </div>

    <!-- Cursusfilter -->
    <div class="settings-section settings-section-last">
      <h2 class="settings-section-title">Cursusfilter</h2>
      <p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin-top:calc(-1 * var(--space-2))">Vink vakken aan die je wil zien op het startscherm. Vakken van het vorig academiejaar worden standaard uitgevinkt.</p>
      <div id="settings-course-list" class="settings-course-list">
        <span class="settings-course-loading">Vakken laden…</span>
      </div>
    </div>

    <div class="settings-actions">
      <button class="btn btn-ghost" id="settings-cancel-btn" type="button">Annuleer</button>
      <button class="btn btn-primary" id="settings-save-btn" type="button">Opslaan</button>
    </div>
  </div>
</dialog>
