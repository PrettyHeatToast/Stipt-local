<!-- ── Screen 1: Courses ─────────────────────────────────────────── -->
<div id="screen-courses" class="screen">
  <div class="page-content">
    <h1 class="page-title">Kies een vak</h1>
    <p class="page-subtitle">Selecteer het vak waarvoor je aanwezigheid wilt registreren.</p>

    <div id="courses-error" class="banner banner-error" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="courses-error-msg">Kon vakken niet laden. Controleer je API-instellingen.</span>
      <button class="banner-close" onclick="closeBanner('courses-error')" aria-label="Sluit melding">✕</button>
    </div>

    <!-- ── Vandaag (iCal suggestions) ───────────────────────────── -->
    <div id="suggestions-section" style="display:none">
      <div class="section-label-row">
        <span class="section-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          Vandaag
        </span>
      </div>
      <div id="suggestions-list" class="card-list suggestions-highlight"></div>
    </div>
    <div id="all-courses-label" class="section-label-row" style="display:none">
      <span class="section-label">Alle vakken</span>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="course-search" class="search-input" type="search" placeholder="Zoek op vaknaam of code…" aria-label="Zoek vakken">
    </div>

    <div id="courses-loading" class="card-list">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <div id="courses-list" class="card-list" style="display:none"></div>

    <div id="courses-empty" class="empty-state" style="display:none">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>Geen vakken gevonden</p>
    </div>
  </div>
</div>
