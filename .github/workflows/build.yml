name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: windows
            release_artifact: "Stipt Local - Windows.exe"
          - os: macos-latest
            label: macos
            release_artifact: "Stipt Local - macOS.zip"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r canvas-attendance/requirements.txt

      - name: Build
        run: python canvas-attendance/build.py

      - name: Package
        shell: bash
        run: |
          cd canvas-attendance/dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            ditto -c -k --keepParent "Stipt Local.app" "Stipt Local - macOS.zip"
          else
            mv "Stipt Local.exe" "Stipt Local - Windows.exe"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stipt-local-${{ matrix.label }}
          path: "canvas-attendance/dist/${{ matrix.release_artifact }}"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/stipt-local-windows/Stipt Local - Windows.exe
            dist/stipt-local-macos/Stipt Local - macOS.zip